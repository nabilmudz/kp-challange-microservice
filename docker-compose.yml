version: '3.9'

networks:
  app-network:
    driver: bridge

volumes:
  product-db-data:
  order-db-data:
  rabbitmq-data:
  redis-data:

services:
  product-db:
    image: postgres:16-alpine
    container_name: product-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PRODUCT_DB_USER:-product_user}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD:-product_pass}
      POSTGRES_DB: ${PRODUCT_DB_NAME:-product_db}
    ports:
    - "5434:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER:-product_user} -d ${PRODUCT_DB_NAME:-product_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ORDER_DB_USER:-order_user}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD:-order_pass}
      POSTGRES_DB: ${ORDER_DB_NAME:-order_db}
    ports:
    - "5435:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER:-order_user} -d ${ORDER_DB_NAME:-order_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --maxmemory ${REDIS_MAX_MEMORY:-128mb} --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    env_file:
      - ./product-service/.env
    environment:
      DB_HOST: product-db
      DB_PORT: 5432
      DB_USER: ${PRODUCT_DB_USER:-product_user}
      DB_PASSWORD: ${PRODUCT_DB_PASSWORD:-product_pass}
      DB_NAME: ${PRODUCT_DB_NAME:-product_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - app-network
    depends_on:
      product-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    env_file:
      - ./order-service/.env
    environment:
      DB_HOST: order-db
      DB_PORT: 5432
      DB_USER: ${ORDER_DB_USER:-order_user}
      DB_PASSWORD: ${ORDER_DB_PASSWORD:-order_pass}
      DB_NAME: ${ORDER_DB_NAME:-order_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      PRODUCT_SERVICE_URL: http://product-service:3001
      PORT: 3002
    ports:
      - "3002:3002"
    networks:
      - app-network
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_started
